<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5Ws of Fashion — Admin Dashboard</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon_io/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/css/dashboard.css">
</head>
<body>

<!-- Configure API base URL for deployment -->
<script>
  // For production: set this to your Render backend URL
  // e.g. window.__API_BASE__ = 'https://your-app.onrender.com';
  // For local dev it defaults to http://localhost:8000
</script>

<!-- ── LOGIN SCREEN ──────────────────────────────── -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">5W</div>
      <h1>5Ws of Fashion</h1>
      <p class="login-subtitle">Admin Dashboard</p>
    </div>

    <!-- Sign In Form -->
    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="admin@5wsoffashion.com" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <div class="pw-wrap">
          <input type="password" id="loginPassword" placeholder="••••••••" required>
          <button type="button" class="pw-toggle" data-target="loginPassword" aria-label="Toggle password">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary-dash" id="loginBtn">Sign In</button>
      <p class="login-error" id="loginError"></p>
    </form>

    <p class="auth-toggle" id="showRegisterToggle">
      No account? <a href="#" id="toggleToRegister">Create one</a>
    </p>

    <!-- Registration Form (separate from login) -->
    <div class="login-register" id="registerSection" style="display:none;">
      <h2 class="register-heading">Create Admin Account</h2>
      <form id="registerForm" class="login-form">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="admin@5wsoffashion.com" required>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <div class="pw-wrap">
            <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
            <button type="button" class="pw-toggle" data-target="regPassword" aria-label="Toggle password">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary-dash">Create Account</button>
        <p class="login-error" id="registerError"></p>
      </form>
      <p class="auth-toggle">
        Already have an account? <a href="#" id="toggleToLogin">Sign in</a>
      </p>
    </div>
  </div>
</div>

<!-- ── DASHBOARD SHELL ───────────────────────────── -->
<div class="dashboard-shell" id="dashboardShell" style="display:none;">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">5W</div>
      <span class="sidebar-title">5Ws Admin</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#/overview" class="nav-item active" data-page="overview" id="navOverview">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Overview</span>
      </a>
      <a href="#/blog" class="nav-item" data-page="blog" id="navBlog">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span>Blog Posts</span>
      </a>
      <a href="#/contacts" class="nav-item" data-page="contacts" id="navContacts">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span>Contacts</span>
        <span class="badge" id="contactsBadge" style="display:none;">0</span>
      </a>
      <a href="#/events" class="nav-item" data-page="events" id="navEvents">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Events</span>
      </a>
      <a href="#/users" class="nav-item" data-page="users" id="navUsers">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Users</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info" id="adminInfo">
        <div class="admin-avatar" id="adminAvatar">A</div>
        <div class="admin-details">
          <span class="admin-name" id="adminName">Admin</span>
          <span class="admin-role">Administrator</span>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn" title="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Mobile Header -->
  <header class="mobile-header" id="mobileHeader">
    <button class="mobile-menu-btn" id="mobileMenuBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="mobile-title">5Ws Admin</span>
    <button class="btn-logout" id="mobileLogoutBtn" title="Sign out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </header>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <div class="content-area" id="contentArea">
      <!-- Dynamic content loaded here -->
    </div>
  </main>
</div>

<!-- ── MODAL OVERLAY ─────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-panel" id="modalPanel">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Modal</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="/dashboard/js/auth.js"></script>
<script src="/dashboard/js/dashboard.js"></script>
</body>
</html>
